set -g mouse on
set -g detach-on-destroy off

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Colour scheme
set -g status-style "fg=color8"
set -g window-status-current-style "fg=blue bold"
set -g status-left-length 100
set -g status-right-length 100

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Sensible prefix key
unbind-key C-b
set -g prefix C-s
bind-key C-s send-prefix

# Open panes in current working directory
bind c neww -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Set vi-mode and paste binds
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Other bindings
bind C-p previous-window
bind C-n next-window
bind C-s switch-client -l

bind-key x kill-pane
bind-key X kill-session

bind-key -r r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

bind-key -r f display-popup -E -B -w 100% -h 100% "tmux-sessionizer"
bind-key -r u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?):\/\/.*[^>]' | fzf-tmux -d20 --multi --bind alt-a:select-all,alt-d:deselect-all | xargs open"
bind-key -r g run-shell -b "tmux-git '#{pane_current_path}'"

if-shell '[ -f "~/.config/tmux/tmux_local.conf" ]' 'source-file "~/.config/tmux/tmux_local.conf"'

run '~/.config/tmux/plugins/tpm/tpm'
